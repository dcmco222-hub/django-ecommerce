{% extends "base.html" %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}

<div class="profile-container">

    <div class="profile-card">

        <h1>Edit Profile</h1>

        <form
            method="POST"
            enctype="multipart/form-data"
        >

            {% csrf_token %}

            <div class="form-group">

                <label>
                    First Name
                </label>

                <input
                    type="text"
                    name="first_name"
                    value="{{ request.user.first_name }}"
                >

            </div>

            <div class="form-group">

                <label>
                    Last Name
                </label>

                <input
                    type="text"
                    name="last_name"
                    value="{{ request.user.last_name }}"
                >

            </div>

            <div class="form-group">

                <label>
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    value="{{ request.user.email }}"
                >

            </div>

            <div class="form-group">

                <label>
                    Profile Picture
                </label>

                <input
                    type="file"
                    name="profile_picture"
                >

            </div>

            <button
                type="submit"
                class="btn btn-large"
            >
                Save Changes
            </button>

        </form>

    </div>

</div>

{% endblock %}

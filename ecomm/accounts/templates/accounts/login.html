{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <div class="auth-header">
            <p class="page-eyebrow">Welcome Back</p>
            <h1>Sign In</h1>
            <p class="auth-subtext">Good to see you again. Let's pick up where you left off.</p>
        </div>

        <form method="POST" class="auth-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Your password" required>
            </div>

            <div class="auth-options">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember"> Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-large btn-full">Sign In</button>

        </form>

        <p class="auth-footer">Don't have an account? <a href="{% url 'register' %}">Register</a></p>

    </div>

</div>

{% endblock %}

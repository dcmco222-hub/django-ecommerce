{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <div class="auth-header">
            <p class="page-eyebrow">Get Started</p>
            <h1>Create an Account</h1>
            <p class="auth-subtext">Join thousands of smart shoppers today.</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="auth-form">
            
            {% csrf_token %}

            <div class="form-group">
                <label for="firstname">Firstname</label>
                <input type="text" id="firstname" name="firstname" placeholder="e.g. John" required>
            </div>

            <div class="form-group">
                <label for="lastname">Lastname</label>
                <input type="text" id="lastname" name="lastname" placeholder="e.g. Doe" required>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="e.g. john_doe" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Min. 8 characters" required>
            </div>

            <div class="form-group">
                <label for="profile_picture">
                    Profile Picture
                </label>
            
                <input
                    type="file"
                    id="profile_picture"
                    name="profile_picture"
                    accept="image/*"
                >
            </div>

            <button type="submit" class="btn btn-large btn-full">Create Account</button>

        </form>

        <p class="auth-footer">Already have an account? <a href="{% url 'login' %}">Sign in</a></p>

    </div>

</div>

{% endblock %}

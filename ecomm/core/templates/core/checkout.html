{% extends "base.html" %}

{% block title %}
Checkout
{% endblock %}

{% block content %}

<div class="page-header">

    <p class="page-eyebrow">
        Checkout
    </p>

    <h1 class="section-title">
        Review Your Order
    </h1>

</div>

<div class="checkout-card">

    {% for item in items %}

    <div class="checkout-item">

        <span>
            {{ item.product.name }}
        </span>

        <span>
            x{{ item.quantity }}
        </span>

        <span>
            ₦{{ item.subtotal }}
        </span>

    </div>

    {% endfor %}

    <hr>

    <h2>
        Total: ₦{{ total }}
    </h2>

    <form method="POST">

        {% csrf_token %}

        <button
            type="submit"
            class="btn btn-large"
        >
            Place Order
        </button>

    </form>

</div>

{% endblock %}

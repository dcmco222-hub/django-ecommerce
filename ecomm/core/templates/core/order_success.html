{% extends "base.html" %}

{% block title %}
Order Successful
{% endblock %}

{% block content %}

<div class="success-card">

    <h1>
        🎉 Order Placed Successfully
    </h1>

    <p>
        Thank you for shopping with us.
    </p>

    <h3>
        Order #{{ order.id }}
    </h3>

    <p>
        Total Paid:
        <strong>
            ₦{{ order.total_price }}
        </strong>
    </p>

    <a
        href="{% url 'product_list' %}"
        class="btn"
    >
        Continue Shopping
    </a>

</div>

{% endblock %}

<!-- templates/includes/navbar.html -->

<nav>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'product_list' %}">Products</a>
    <a href="{% url 'category_list' %}">Categories</a>
    {% if user.is_authenticated %}

    <a href="{% url 'profile' %}">
        {{ user.username }}
    </a>

    <a href="{% url 'logout' %}">
        Logout
    </a>

{% else %}

    <a href="{% url 'login' %}">
        Login
    </a>

    <a href="{% url 'register' %}">
        Register
    </a>

{% endif %}
</nav>
